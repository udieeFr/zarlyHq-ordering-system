{% extends 'base.html' %}

{% block content %}
<div class="container text-center login-selection-container">
    <div class="card shadow">
        <div class="card-body">
            <h3>Choose Login Type</h3>
            <p>Please select how you would like to log in:</p>
            <div class="d-grid gap-2 col-6 mx-auto">
                <a href="{% url 'customer_login' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-utensils"></i> Customer Login
                </a>
                <a href="{% url 'admin_login' %}" class="btn btn-warning btn-lg">
                    <i class="fas fa-user-shield"></i> Admin Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
