<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zarly BigFood Ordering</title>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Zarly BigFood</a>
            <div>
                {% if user.is_authenticated %}
                    Welcome, {{ user.username }} | 
                    <a href="{% url 'logout' %}?next={{ request.path }}" class="text-white">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}?next={{ request.path }}" class="text-white">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
